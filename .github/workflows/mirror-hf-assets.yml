# Mirror the HuggingFace-hosted bundled assets into our own release assets.
#
# Why: exactly three bundled files are fetched from HF — the Piper TTS voice
# (.onnx + .onnx.json) and the nomic embedding GGUF. On 2026-07-13 HF's xet
# CDN 403-stormed for hours, failing four consecutive release builds, first at
# the voice and then at the embed model (llama-server and piper come from
# GitHub releases and were unaffected). The exact bytes we need are already
# inside our own shipped installers — digest-verified when they were built —
# so this workflow extracts all three from a released .deb, re-verifies the
# pinned SHA-256s, and uploads them to a dedicated non-latest prerelease tag
# that fetch-local-model.mjs tries FIRST (HF stays as fallback). GitHub→runner
# downloads are the reliable path, and the digest pins make the mirror
# tamper-evident: wrong bytes fail closed, never substitute.
#
# The tag deliberately does not match v* so it can never trigger release.yml.
name: mirror-hf-assets

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Released tag whose .deb carries the digest-verified assets"
        default: "v0.8.1"
      mirror_tag:
        description: "Release tag to upload the mirrored assets to"
        default: "hf-assets-1"

permissions:
  contents: write # create the mirror release and upload assets

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      # Must match ASSET_SHA256 in scripts/fetch-local-model.mjs.
      ONNX_SHA256: 5efe09e69902187827af646e1a6e9d269dee769f9877d17b16b1b46eeaaf019f
      JSON_SHA256: efe19c417bed055f2d69908248c6ba650fa135bc868b0e6abb3da181dab690a0
      GGUF_SHA256: 3e24342164b3d94991ba9692fdc0dd08e3fd7362e0aacc396a9a5c54a544c3b7
      # OCR models (add-ocr-perception) are NOT inside any shipped .deb yet, so
      # they're mirrored by direct URL from the ocrs S3 bucket + pinned digest.
      DET_SHA256: f15cfb56bd02c4bf478a20343986504a1f01e1665c2b3a0ad66340f054b1b5ca
      REC_SHA256: e484866d4cce403175bd8d00b128feb08ab42e208de30e42cd9889d8f1735a6e
      OCRS_MODELS_URL: https://ocrs-models.s3-accelerate.amazonaws.com
    steps:
      - name: Download the released .deb
        run: |
          set -euo pipefail
          gh release download "${{ inputs.source_tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern '*_amd64.deb' --dir deb
          ls -la deb/
      - name: Extract the assets and verify the pinned digests
        run: |
          set -euo pipefail
          dpkg-deb -x deb/*.deb unpacked
          ONNX=$(find unpacked -name 'en_US-lessac-medium.onnx' | head -1)
          JSON=$(find unpacked -name 'en_US-lessac-medium.onnx.json' | head -1)
          GGUF=$(find unpacked -name 'nomic-embed-text-v1.5.Q8_0.gguf' | head -1)
          [ -n "$ONNX" ] && [ -n "$JSON" ] && [ -n "$GGUF" ] || {
            echo "expected assets not all found in .deb"; find unpacked -maxdepth 4 -type d; exit 1; }
          echo "$ONNX_SHA256  $ONNX" | sha256sum -c -
          echo "$JSON_SHA256  $JSON" | sha256sum -c -
          echo "$GGUF_SHA256  $GGUF" | sha256sum -c -
          mkdir -p out
          cp "$ONNX" out/en_US-lessac-medium.onnx
          cp "$JSON" out/en_US-lessac-medium.onnx.json
          cp "$GGUF" out/nomic-embed-text-v1.5.Q8_0.gguf
      - name: Fetch + verify the OCR models by direct URL
        run: |
          set -euo pipefail
          mkdir -p out
          for pair in "text-detection.rten:$DET_SHA256" "text-recognition.rten:$REC_SHA256"; do
            name="${pair%%:*}"; digest="${pair##*:}"
            curl -fSL --retry 3 -o "out/$name" "$OCRS_MODELS_URL/$name"
            echo "$digest  out/$name" | sha256sum -c -
          done
      - name: Create the mirror release (idempotent) and upload
        run: |
          set -euo pipefail
          TAG="${{ inputs.mirror_tag }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --prerelease --latest=false \
              --title "HF asset mirror (build assets)" \
              --notes "Mirror of the HuggingFace-hosted bundled assets used by CI builds: the pinned Piper voice (en_US-lessac-medium, rhasspy/piper-voices) and the nomic embedding GGUF (nomic-ai/nomic-embed-text-v1.5-GGUF). Extracted from our own digest-verified installer; scripts/fetch-local-model.mjs verifies the same pinned SHA-256 on every download. Not an app release."
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            out/en_US-lessac-medium.onnx \
            out/en_US-lessac-medium.onnx.json \
            out/nomic-embed-text-v1.5.Q8_0.gguf \
            out/text-detection.rten \
            out/text-recognition.rten
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[] | "\(.name) \(.size)"'
