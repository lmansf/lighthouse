# Manual (workflow_dispatch) macOS bootstrap for the iOS app (§2.2 + signing).
# Runs the two macOS-gated steps that the Linux dev env can't:
#   - `certs`   : fastlane match creates/refreshes the Apple Distribution cert +
#                 profiles for app.lhvault and stores them ENCRYPTED in the
#                 private MATCH_GIT_URL repo.
#   - `ios-init`: `tauri ios init` generates gen/apple and commits it back to the
#                 branch this ran on.
# Prereqs: the repo secrets in docs/mobile-signing.md must exist. Nothing here is
# on the desktop release path — it only runs when you click "Run workflow".
name: mobile-bootstrap

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What to run"
        type: choice
        default: both
        options: [both, certs, ios-init]

jobs:
  ios-certs:
    if: ${{ inputs.task == 'certs' || inputs.task == 'both' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight — required repo secrets are present
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          missing=()
          for v in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID \
                   APP_STORE_CONNECT_KEY_P8 APPLE_TEAM_ID MATCH_GIT_URL \
                   MATCH_PASSWORD MATCH_GIT_TOKEN; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing/empty repository secrets: ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions → *Repository* secrets"
            echo "(NOT Environment secrets — this workflow has no 'environment:' declared). See docs/mobile-signing.md."
            exit 1
          fi
          echo "All 7 Apple/match secrets are present."
      - name: Preflight — App Store Connect key material is well-formed
        # Structural checks only — the decoded .p8 is NEVER printed. Rules out
        # malformed base64 / wrong-shaped IDs so a match auth failure can be
        # attributed to a Key-ID↔.p8 mismatch or a revoked key instead.
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          fail=0
          if ! printf '%s' "$APP_STORE_CONNECT_KEY_ID" | grep -Eq '^[A-Z0-9]{10}$'; then
            echo "::error::APP_STORE_CONNECT_KEY_ID is not a 10-char App Store Connect key id (length ${#APP_STORE_CONNECT_KEY_ID})."
            fail=1
          fi
          if ! printf '%s' "$APP_STORE_CONNECT_ISSUER_ID" | grep -Eiq '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "::error::APP_STORE_CONNECT_ISSUER_ID is not a UUID."
            fail=1
          fi
          # Decode the .p8 through the pipe and assert PKCS#8 — decoded bytes are
          # discarded by grep -q, never echoed.
          if printf '%s' "$APP_STORE_CONNECT_KEY_P8" | openssl base64 -d -A 2>/dev/null | grep -q 'BEGIN PRIVATE KEY'; then
            echo "APP_STORE_CONNECT_KEY_P8 decodes to a PKCS#8 private key ✔"
          else
            echo "::error::APP_STORE_CONNECT_KEY_P8 does not base64-decode to a '-----BEGIN PRIVATE KEY-----' block."
            echo "Re-encode the raw file with: base64 -i AuthKey_XXXX.p8 | pbcopy  (no extra newlines/spaces; do not double-encode)."
            fail=1
          fi
          [ "$fail" -ne 0 ] && exit 1
          echo "Key material is well-formed."
          echo "NOTE: if 'match' still reports 'Authentication credentials are missing or invalid',"
          echo "the Key ID and the .p8 are from DIFFERENT keys, or the key was revoked (see docs/mobile-signing.md)."
      - name: Diagnose — fingerprint the stored .p8 (public key only, no secret printed)
        # Prints the PUBLIC-key SHA-256 + curve of the stored .p8 so it can be
        # matched against the real key file. Only public material is emitted; the
        # decoded private key is written mode-600 to RUNNER_TEMP and deleted.
        env:
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          set +e
          umask 077
          KF="$RUNNER_TEMP/asc_key.p8"; PUB="$RUNNER_TEMP/asc_pub.pem"
          printf '%s' "$APP_STORE_CONNECT_KEY_P8" | openssl base64 -d -A > "$KF" 2>/dev/null
          openssl pkey -in "$KF" -pubout -out "$PUB" 2>/dev/null
          FP=$(openssl pkey -pubin -in "$PUB" -outform DER 2>/dev/null | openssl dgst -sha256 2>/dev/null | awk '{print $NF}')
          CURVE=$(openssl pkey -pubin -in "$PUB" -text -noout 2>/dev/null | grep -i 'NIST CURVE' | tr -d ' ')
          rm -f "$KF" "$PUB"
          echo "Stored .p8 -> public-key SHA-256: ${FP:-<not-parseable-as-EC-key>}"
          echo "Stored .p8 -> curve: ${CURVE:-<unknown>}   (App Store Connect keys are NISTCURVE:P-256)"
          echo "On your Mac, confirm this is the SAME key as your Key ID by running:"
          echo "  openssl pkey -in AuthKey_<yourKeyID>.p8 -pubout -outform DER | openssl dgst -sha256"
          echo "Match => .p8 secret is correct, so a persistent 401 means the Issuer ID is wrong,"
          echo "or the key is revoked / an Individual (not Team) key. Mismatch => wrong .p8 uploaded."
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3" # no .ruby-version in repo — setup-ruby requires an explicit pin
          bundler-cache: true # bundle install (root Gemfile pins fastlane) + cache
      - name: Derive match git auth (base64 user:token — never logged)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          AUTH=$(printf '%s' "x-access-token:${MATCH_GIT_TOKEN}" | base64 | tr -d '\n')
          echo "::add-mask::${AUTH}"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=${AUTH}" >> "$GITHUB_ENV"
      - name: fastlane match — create/refresh app.lhvault signing (readonly off)
        run: bundle exec fastlane ios certs
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APP_STORE_CONNECT_KEY_P8_BASE64: "1"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_GIT_BASIC_AUTHORIZATION comes from the derive step above.
          # certs lane hard-sets readonly:false; MATCH_READONLY left unset.

  ios-init:
    if: ${{ inputs.task == 'ios-init' || inputs.task == 'both' }}
    runs-on: macos-latest
    permissions:
      contents: write # to push gen/apple back to the branch
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true # keep GITHUB_TOKEN wired for the push
      - name: Preflight — APPLE_TEAM_ID is present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is missing/empty — 'tauri ios init' needs it for apple.development-team."
            echo "Add it under Settings → Secrets and variables → Actions → *Repository* secrets. See docs/mobile-signing.md."
            exit 1
          fi
          echo "APPLE_TEAM_ID present."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - name: Ensure Cocoapods
        run: brew list cocoapods >/dev/null 2>&1 || brew install cocoapods
      - name: Install JS deps
        run: npm ci
      - name: Static-export the UI (frontendDist = ui-dist)
        run: node scripts/build-ui-static.mjs
      - name: tauri ios init (non-interactive)
        working-directory: native/crates/lighthouse-desktop
        env:
          CI: "true"
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --yes @tauri-apps/cli@^2 ios init --ci --skip-targets-install --verbose
      - name: Commit gen/apple back to the branch
        working-directory: native/crates/lighthouse-desktop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tauri's template gitignores /gen — force-add so the project is tracked.
          git add -f gen/apple
          if git diff --cached --quiet; then
            echo "gen/apple unchanged — nothing to commit."
          else
            git commit -m "chore(ios): generate gen/apple via mobile-bootstrap [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
