# Manual (workflow_dispatch) macOS bootstrap for the iOS app (§2.2 + signing).
# Runs the two macOS-gated steps that the Linux dev env can't:
#   - `certs`   : fastlane match creates/refreshes the Apple Distribution cert +
#                 profiles for app.lhvault and stores them ENCRYPTED in the
#                 private MATCH_GIT_URL repo.
#   - `ios-init`: `tauri ios init` generates gen/apple and commits it back to the
#                 branch this ran on.
# Prereqs: the repo secrets in docs/mobile-signing.md must exist. Nothing here is
# on the desktop release path — it only runs when you click "Run workflow".
name: mobile-bootstrap

on:
  workflow_dispatch:
    inputs:
      task:
        description: "What to run"
        type: choice
        default: both
        options: [both, certs, ios-init, ios-build, ios-beta]

jobs:
  ios-certs:
    if: ${{ inputs.task == 'certs' || inputs.task == 'both' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight — required repo secrets are present
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          missing=()
          for v in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID \
                   APP_STORE_CONNECT_KEY_P8 APPLE_TEAM_ID MATCH_GIT_URL \
                   MATCH_PASSWORD MATCH_GIT_TOKEN; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing/empty repository secrets: ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions → *Repository* secrets"
            echo "(NOT Environment secrets — this workflow has no 'environment:' declared). See docs/mobile-signing.md."
            exit 1
          fi
          echo "All 7 Apple/match secrets are present."
      - name: Preflight — App Store Connect key material is well-formed
        # Structural checks only — the decoded .p8 is NEVER printed. Rules out
        # malformed base64 / wrong-shaped IDs so a match auth failure can be
        # attributed to a Key-ID↔.p8 mismatch or a revoked key instead.
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          fail=0
          if ! printf '%s' "$APP_STORE_CONNECT_KEY_ID" | grep -Eq '^[A-Z0-9]{10}$'; then
            echo "::error::APP_STORE_CONNECT_KEY_ID is not a 10-char App Store Connect key id (length ${#APP_STORE_CONNECT_KEY_ID})."
            fail=1
          fi
          if ! printf '%s' "$APP_STORE_CONNECT_ISSUER_ID" | grep -Eiq '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "::error::APP_STORE_CONNECT_ISSUER_ID is not a UUID."
            fail=1
          fi
          # Decode the .p8 through the pipe and assert PKCS#8 — decoded bytes are
          # discarded by grep -q, never echoed.
          if printf '%s' "$APP_STORE_CONNECT_KEY_P8" | openssl base64 -d -A 2>/dev/null | grep -q 'BEGIN PRIVATE KEY'; then
            echo "APP_STORE_CONNECT_KEY_P8 decodes to a PKCS#8 private key ✔"
          else
            echo "::error::APP_STORE_CONNECT_KEY_P8 does not base64-decode to a '-----BEGIN PRIVATE KEY-----' block."
            echo "Re-encode the raw file with: base64 -i AuthKey_XXXX.p8 | pbcopy  (no extra newlines/spaces; do not double-encode)."
            fail=1
          fi
          [ "$fail" -ne 0 ] && exit 1
          echo "Key material is well-formed."
          echo "NOTE: if 'match' still reports 'Authentication credentials are missing or invalid',"
          echo "the Key ID and the .p8 are from DIFFERENT keys, or the key was revoked (see docs/mobile-signing.md)."
      - name: Diagnose — identity of the stored ASC credentials (hashes only, no secret printed)
        # Emits SHA-256 of the Key ID and Issuer ID (a hash reveals neither, and
        # neither is sensitive), plus the PUBLIC-key SHA-256 + curve of the stored
        # .p8. Lets the stored triple be checked against the intended values. The
        # decoded private key is written mode-600 to RUNNER_TEMP and deleted.
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          set +e
          umask 077
          h(){ printf '%s' "$1" | openssl dgst -sha256 2>/dev/null | awk '{print $NF}'; }
          echo "Stored KEY_ID    sha256: $(h "$APP_STORE_CONNECT_KEY_ID")"
          echo "Stored ISSUER_ID sha256: $(h "$APP_STORE_CONNECT_ISSUER_ID")"
          KF="$RUNNER_TEMP/asc_key.p8"
          printf '%s' "$APP_STORE_CONNECT_KEY_P8" | openssl base64 -d -A > "$KF" 2>/dev/null
          FP=$(openssl pkey -in "$KF" -pubout -outform DER 2>/dev/null | openssl dgst -sha256 2>/dev/null | awk '{print $NF}')
          CURVE=$(openssl pkey -in "$KF" -pubout 2>/dev/null | openssl pkey -pubin -text -noout 2>/dev/null | grep -i 'NIST CURVE' | tr -d ' ')
          rm -f "$KF"
          echo "Stored .p8 public-key SHA-256: ${FP:-<not-parseable-as-EC-key>}"
          echo "Stored .p8 curve: ${CURVE:-<unknown>}   (App Store Connect keys are NISTCURVE:P-256)"
          echo "Compare the .p8 fingerprint on your Mac:"
          echo "  openssl pkey -in AuthKey_<yourKeyID>.p8 -pubout -outform DER | openssl dgst -sha256"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3" # no .ruby-version in repo — setup-ruby requires an explicit pin
          bundler-cache: true # bundle install (root Gemfile pins fastlane) + cache
      - name: Derive match git auth (base64 user:token — never logged)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          AUTH=$(printf '%s' "x-access-token:${MATCH_GIT_TOKEN}" | base64 | tr -d '\n')
          echo "::add-mask::${AUTH}"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=${AUTH}" >> "$GITHUB_ENV"
      - name: fastlane match — create/refresh app.lhvault signing (readonly off)
        run: bundle exec fastlane ios certs
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APP_STORE_CONNECT_KEY_P8_BASE64: "1"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_GIT_BASIC_AUTHORIZATION comes from the derive step above.
          # certs lane hard-sets readonly:false; MATCH_READONLY left unset.

  ios-init:
    if: ${{ inputs.task == 'ios-init' || inputs.task == 'both' }}
    runs-on: macos-latest
    permissions:
      contents: write # to push gen/apple back to the branch
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true # keep GITHUB_TOKEN wired for the push
      - name: Preflight — APPLE_TEAM_ID is present
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::APPLE_TEAM_ID secret is missing/empty — 'tauri ios init' needs it for apple.development-team."
            echo "Add it under Settings → Secrets and variables → Actions → *Repository* secrets. See docs/mobile-signing.md."
            exit 1
          fi
          echo "APPLE_TEAM_ID present."
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - name: Ensure Cocoapods
        run: brew list cocoapods >/dev/null 2>&1 || brew install cocoapods
      - name: Install JS deps
        run: npm ci
      - name: Static-export the UI (frontendDist = ui-dist)
        run: node scripts/build-ui-static.mjs
      - name: tauri ios init (non-interactive)
        working-directory: native/crates/lighthouse-desktop
        env:
          CI: "true"
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --yes @tauri-apps/cli@^2 ios init --ci --skip-targets-install --verbose
      - name: Commit gen/apple back to the branch
        working-directory: native/crates/lighthouse-desktop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Tauri's template gitignores /gen — force-add so the project is tracked.
          git add -f gen/apple
          if git diff --cached --quiet; then
            echo "gen/apple unchanged — nothing to commit."
          else
            git commit -m "chore(ios): generate gen/apple via mobile-bootstrap [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

  # Build the signed App Store .ipa from the committed gen/apple project
  # (task=ios-build), optionally uploading it to TestFlight (task=ios-beta —
  # requires the App Store Connect app record for app.lhvault to exist; see
  # docs/mobile-signing.md). The Rust lib compiles inside Xcode's "Build Rust
  # Code" phase, so this job just preps toolchains and lets fastlane gym drive.
  ios-build:
    if: ${{ inputs.task == 'ios-build' || inputs.task == 'ios-beta' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preflight — required repo secrets are present
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          missing=()
          for v in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID \
                   APP_STORE_CONNECT_KEY_P8 APPLE_TEAM_ID MATCH_GIT_URL \
                   MATCH_PASSWORD MATCH_GIT_TOKEN; do
            [ -z "${!v}" ] && missing+=("$v")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing/empty repository secrets: ${missing[*]}"
            exit 1
          fi
          echo "All 7 Apple/match secrets are present."
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Install JS deps
        run: npm ci
      - name: Static-export the UI (frontendDist = ui-dist)
        run: node scripts/build-ui-static.mjs
      - name: Fetch bundled OCR models (scanned-PDF/image reading on device)
        # iOS field patch 2 §1: without this the bundle ships resources/ocr as
        # a .gitkeep placeholder and scanned PDFs honestly extract to nothing
        # (first-device report). OCR-only on purpose — llama-server can't run
        # on iOS and the embedding GGUF is served BY llama-server, so neither
        # belongs in the mobile bundle. NOT continue-on-error (unlike the
        # desktop step): here the models are the point of the bundle entry —
        # a build without them would re-ship the exact defect this fixes.
        run: node scripts/fetch-local-model.mjs --only=ocr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage OCR models into the iOS asset payload (ui-dist/ocr → app assets/ocr)
        # iOS field patch 3 §1 — THE fix for "OCR fetched in CI but never on
        # device". On iOS, tauri.conf.json `bundle.resources` (llm/embed/ocr)
        # do NOT board the .app: that config is a DESKTOP-bundler concept, and
        # `tauri ios build` drives xcodebuild against the COMMITTED pbxproj (no
        # xcodegen regen — verified in the fp2 build log — so gen/apple/project.yml
        # is inert at build time). The seam that DOES survive is frontendDist:
        # tauri copies `ui-dist` → `gen/apple/assets` wholesale, and the pbxproj
        # `assets` folder-reference copies that into `<App>.app/assets`. On iOS
        # tauri's resource_dir() IS `<App>.app/assets`, so the engine resolves
        # models at `assets/ocr` (config::resources_dir().join("ocr")). Placing
        # them under `ui-dist/ocr` therefore lands them EXACTLY at the resolved
        # path with ZERO engine-resolution changes. iOS-only (this job); the
        # desktop build keeps its own clean ui-dist + bundle.resources path.
        run: |
          set -euo pipefail
          mkdir -p ui-dist/ocr
          cp -f resources/ocr/text-detection.rten resources/ocr/text-recognition.rten ui-dist/ocr/
          echo "Staged bundled OCR models into ui-dist/ocr:"
          ls -la ui-dist/ocr
      - name: Derive match git auth (base64 user:token — never logged)
        env:
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
        run: |
          AUTH=$(printf '%s' "x-access-token:${MATCH_GIT_TOKEN}" | base64 | tr -d '\n')
          echo "::add-mask::${AUTH}"
          echo "MATCH_GIT_BASIC_AUTHORIZATION=${AUTH}" >> "$GITHUB_ENV"
      - name: Sync iOS bundle version (marketing = package.json, build = run number)
        run: |
          VER=$(node -p "require('./package.json').version")
          PLIST=native/crates/lighthouse-desktop/gen/apple/lighthouse-desktop_iOS/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VER}" "$PLIST"
          # TestFlight requires a unique, increasing build number per upload.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PLIST"
          echo "iOS version ${VER} (build ${{ github.run_number }})"
      - name: Build signed .ipa
        # Always just BUILD here (both tasks). The TestFlight upload is a
        # separate step below so the OCR-payload tripwire can gate it (fp3 §1).
        env:
          CI: "true"
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APP_STORE_CONNECT_KEY_P8_BASE64: "1"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_READONLY: "1"
        run: bundle exec fastlane ios build_ipa
      - name: Assert OCR models boarded the .app payload (fp3 §1 tripwire)
        # Prove the two .rten models are inside the built payload at the path
        # the engine actually resolves on iOS (<App>.app/assets/ocr). This is
        # the standing guard against silently re-shipping the first-device
        # defect (scanned PDFs extracting to nothing). It runs BEFORE the
        # TestFlight upload, so a modelless build fails here and never reaches
        # testers. On failure it prints where the .rten files DID land, so a
        # broken staging seam is diagnosable in one run.
        run: |
          set -euo pipefail
          IPA=build/ios/Lighthouse.ipa
          test -f "$IPA" || { echo "::error::no .ipa at $IPA"; exit 1; }
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 1 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo "::error::no .app inside Payload/"; exit 1; }
          missing=0
          for m in text-detection.rten text-recognition.rten; do
            f="$APP/assets/ocr/$m"
            if [ -f "$f" ]; then
              echo "✔ assets/ocr/$m ($(wc -c < "$f" | tr -d ' ') bytes)"
            else
              echo "::error::MISSING $m at assets/ocr/ in the .app payload"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Diagnostic — .rten files actually present in the payload:"
            find "$APP" -name '*.rten' -print || echo "  (none anywhere in the .app)"
            rm -rf "$WORK"; exit 1
          fi
          rm -rf "$WORK"
          echo "OCR models boarded the payload at the engine-resolved path (assets/ocr)."
      - name: Assert the private-model bridge boarded the app binary (0.13.9 tripwire)
        # The on-device private model is reached from Rust via the ObjC-runtime
        # class LHFMBridge (PrivateModelServer.swift). 0.13.8 shipped a binary
        # whose bridge was unreachable at runtime — every iPhone read a false
        # "requires iOS 26 or later" — so this guard makes that failure mode
        # fail the BUILD instead of reaching testers. The class name lives in
        # the binary's ObjC metadata (__objc_classname) and survives symbol
        # stripping, so its absence means the bridge did not compile in.
        run: |
          set -euo pipefail
          IPA=build/ios/Lighthouse.ipa
          test -f "$IPA" || { echo "::error::no .ipa at $IPA"; exit 1; }
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 1 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo "::error::no .app inside Payload/"; exit 1; }
          BIN="$APP/$(basename "$APP" .app)"
          test -f "$BIN" || { echo "::error::no app binary at $BIN"; exit 1; }
          # grep -c (not -q): -q exits at the first match, llvm-strings then
          # dies with "failed to flush output" on the closed pipe, and under
          # pipefail that VETOES the match — run 26 failed exactly this way on
          # a binary that carried the bridge. -c reads to EOF, so the pipe
          # stays open and the count is the verdict; || true keeps the
          # no-match exit(1) from tripping set -e before we can report it.
          FOUND=$(strings "$BIN" | grep -c '^LHFMBridge$' || true)
          if [ "${FOUND:-0}" -gt 0 ]; then
            echo "OK: LHFMBridge class metadata present in the app binary (count=$FOUND)"
          else
            echo "::error::LHFMBridge missing from the app binary — the private-model bridge did not compile in"
            rm -rf "$WORK"; exit 1
          fi
          # Informational only: whether the legacy dlsym fallback symbol is in
          # the export trie (the ObjC route above is the one that must hold).
          EXPORTED=$(dyld_info -exports "$BIN" 2>/dev/null | grep -c lighthouse_fm_ensure || true)
          if [ "${EXPORTED:-0}" -gt 0 ]; then
            echo "OK: dlsym fallback symbol also exported"
          else
            echo "note: lighthouse_fm_ensure not in the export trie (ObjC route covers it)"
          fi
          rm -rf "$WORK"
      - name: Assert the Tier-2 model weights are NOT bundled (§42 payload guard)
        # §42 §5 (the §25 OCR-lesson pattern, inverted): the on-device fallback
        # model is DOWNLOADED on demand, never shipped — so the .ipa must carry
        # NO .gguf and must not balloon. This is the standing guard against an
        # accidental weight-bundling that would blow the App Store size limit
        # and defeat the download-with-consent design. Runs BEFORE the upload.
        run: |
          set -euo pipefail
          IPA=build/ios/Lighthouse.ipa
          test -f "$IPA" || { echo "::error::no .ipa at $IPA"; exit 1; }
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 1 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo "::error::no .app inside Payload/"; exit 1; }
          # No model weights anywhere in the payload (weights are user-downloaded).
          # Count with `wc -l` (read to EOF) rather than an early-exit match, which
          # can SIGPIPE-veto under pipefail (the bridge-tripwire lesson).
          GGUF=$(find "$APP" -iname '*.gguf' -print | wc -l | tr -d ' ')
          if [ "${GGUF:-0}" -gt 0 ]; then
            echo "::error::a .gguf shipped in the .ipa — the Tier-2 model must be downloaded, never bundled"
            find "$APP" -iname '*.gguf' -print
            rm -rf "$WORK"; exit 1
          fi
          # Non-balloon: the .ipa stays well under the App Store cellular ceiling.
          # A weightless build is tens of MB; 200 MB is a generous roof that a
          # bundled ~1 GB model would smash through.
          SIZE_MB=$(( $(stat -f%z "$IPA" 2>/dev/null || stat -c%s "$IPA") / 1024 / 1024 ))
          echo "ipa size: ${SIZE_MB} MB (no .gguf bundled)"
          if [ "$SIZE_MB" -gt 200 ]; then
            echo "::error::.ipa is ${SIZE_MB} MB — ballooned past the 200 MB roof (a model may have been bundled)"
            rm -rf "$WORK"; exit 1
          fi
          # Diagnostic (not a gate): whether the llama xcframework linked in. The
          # framework/pbxproj wiring + on-device model run are macOS/device
          # acceptance items (docs/ios-private-model.md §4.1); the app builds and
          # ships FM-only until it is wired (#if canImport(llama) guards it), so
          # this reports presence without blocking the working pipeline.
          BIN="$APP/$(basename "$APP" .app)"
          LLAMA=$(strings "$BIN" | grep -ci 'llama_decode\|ggml_metal' || true)
          if [ "${LLAMA:-0}" -gt 0 ]; then
            echo "note: llama backend symbols present — the Tier-2 framework linked in"
          else
            echo "note: llama backend not linked yet (FM-only build) — xcframework wiring is a device-acceptance item"
          fi
          rm -rf "$WORK"
      - name: Upload to TestFlight
        if: ${{ inputs.task == 'ios-beta' }}
        env:
          CI: "true"
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          APP_STORE_CONNECT_KEY_P8_BASE64: "1"
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bundle exec fastlane ios upload_only
      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ios-ipa
          path: build/ios/*.ipa
          if-no-files-found: warn
      - name: Upload raw xcodebuild log (diagnosis)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ios-buildlog
          path: ~/Library/Logs/gym/
          if-no-files-found: warn
