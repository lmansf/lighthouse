# Publish a draft GitHub release (flips draft → public, creating its tag).
# Exists because release publishing is deliberately a separate, explicit step
# from building: the build pipelines only ever produce drafts.
name: publish-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag of the draft release to publish"
        required: true
        default: "v0.3.0"
      body:
        description: "Optional release notes (markdown); replaces the body when non-empty"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_BODY: ${{ inputs.body }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            // List (not getByTag) so drafts — which have no tag ref yet — are found.
            const releases = await github.paginate(github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 });
            const rel = releases.find(r => r.tag_name === tag);
            if (!rel) return core.setFailed(`no release with tag ${tag}`);
            // Normalize to a full, public, latest-eligible release. GitHub
            // excludes both drafts and prereleases from "latest", which the
            // website download button and the update check rely on — so clear
            // prerelease too, not just draft.
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: rel.id,
              draft: false,
              prerelease: false,
              make_latest: 'true',
            };
            const body = process.env.RELEASE_BODY;
            if (body && body.trim()) params.body = body;
            const { data } = await github.rest.repos.updateRelease(params);
            core.info(`published ${data.html_url} (draft=${data.draft} prerelease=${data.prerelease})`);
