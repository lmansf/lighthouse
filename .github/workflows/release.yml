name: Release

# Build the desktop installers natively (Wine can't be used to cross-build the
# Windows NSIS .exe) and publish them to a GitHub Release. The lighthouse-web
# download button auto-detects the .exe asset, so publishing the release makes
# the download work with no further web change.
#
# Trigger: push a tag like `v0.1.0` (must match package.json "version"), or run
# it manually from the Actions tab ("Run workflow").
#
# NOTE: GitHub release assets are capped at 2 GB per file. The bundled ~4.2 GB
# model pushes the installer well past that, so the larger asset must be handled
# (e.g. drop to a smaller model or switch to first-run model download); a plain
# upload of an over-2 GB installer will be rejected.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create the release and upload installer assets

jobs:
  # Gate: types, tests, and lint must pass before anything is built or published.
  # Previously the pipeline only built + published, so a broken typecheck or a
  # failing test could be cut into a signed release with nothing catching it.
  check:
    name: Typecheck, tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22: `node --test` glob patterns (used by test:extract) require >=21.
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm run test:extract
      # Blocking: eslint + eslint-config-next are pinned in devDependencies and
      # installed by `npm ci`, and `next lint` passes clean, so a lint regression
      # now fails the gate and blocks the release.
      - name: Lint
        run: npm run lint

  build:
    needs: check
    # "true" only when a signing cert secret is configured; "false" (unsigned)
    # otherwise. Referencing secrets in a job-level env is allowed, and a step `if`
    # can read it. Must NOT be overridden in the build step's own env.
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest # → Lighthouse-Setup .exe (NSIS), x64
          - os: macos-latest # → Lighthouse .dmg, arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Populate the signing env ONLY when the certs exist. Critically, do NOT set
      # these from (empty) secrets in a plain env block: an empty CSC_LINK makes
      # electron-builder try to read "" as a cert file and fail ("… not a file").
      # Skipping this step leaves them unset, so the build is cleanly unsigned. To
      # sign + notarize, add these repo secrets — nothing else changes:
      #   CSC_LINK / CSC_KEY_PASSWORD                 base64 .p12 cert + password (mac & win)
      #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID    (macOS notarization)
      # See docs/auto-updater-design.md §3 for the key-custody caveat (prefer
      # cloud/HSM signing over a raw cert in Actions secrets).
      - name: Configure code signing
        if: ${{ env.CSC_IDENTITY_AUTO_DISCOVERY == 'true' }}
        shell: bash
        run: |
          {
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      # `npm run release` = fetch the pinned, hash-verified llama-server + TTS into
      # resources/, then electron-builder builds and publishes to a draft release
      # tagged v<version>. Both matrix jobs publish to the same draft, so the .exe
      # and .dmg attach together. build/notarize.cjs activates once APPLE_* are set.
      - name: Build and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
