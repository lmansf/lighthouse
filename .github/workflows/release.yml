name: Release

# Build the desktop installers natively (Wine can't be used to cross-build the
# Windows NSIS .exe) and publish them to a GitHub Release. The lighthouse-web
# download button auto-detects the .exe asset, so publishing the release makes
# the download work with no further web change.
#
# Trigger: push a tag like `v0.1.0` (must match package.json "version"), or run
# it manually from the Actions tab ("Run workflow").
#
# NOTE: GitHub release assets are capped at 2 GB per file. The bundled ~4.2 GB
# model pushes the installer well past that, so the larger asset must be handled
# (e.g. drop to a smaller model or switch to first-run model download); a plain
# upload of an over-2 GB installer will be rejected.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create the release and upload installer assets

jobs:
  # Gate: types, tests, and lint must pass before anything is built or published.
  # Previously the pipeline only built + published, so a broken typecheck or a
  # failing test could be cut into a signed release with nothing catching it.
  check:
    name: Typecheck, tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22: `node --test` glob patterns (used by test:extract) require >=21.
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm run test:extract
      # Lint is advisory until eslint + eslint-config-next are pinned in
      # package.json (kept out of this change to avoid a package-lock version bump
      # that couldn't be verified here). Installed ad hoc; failures don't block the
      # release. Flip `continue-on-error` off once the deps are pinned and green.
      - name: Lint (advisory)
        continue-on-error: true
        run: |
          npm install --no-save eslint@^8.57.1 eslint-config-next@15.5.19
          npx next lint

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest # → Lighthouse-Setup .exe (NSIS), x64
          - os: macos-latest # → Lighthouse .dmg, arm64 (unsigned)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run release` = fetch the llama-server binary + GGUF into
      # resources/llm, then electron-builder builds and publishes to a draft
      # release tagged v<version>. Both matrix jobs publish to the same draft,
      # so the .exe and .dmg attach together.
      - name: Build and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — active ONLY when the matching repo secrets are set. With
          # none present the build falls back to unsigned (CSC_IDENTITY_AUTO_DISCOVERY
          # is turned off so electron-builder doesn't fail hunting for an identity,
          # and build/notarize.cjs no-ops without the Apple creds). To sign + notarize,
          # add these secrets — nothing else needs to change:
          #   CSC_LINK / CSC_KEY_PASSWORD  base64 .p12 code-signing cert + password (mac & win)
          #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID  (macOS notarization)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
        run: npm run release
