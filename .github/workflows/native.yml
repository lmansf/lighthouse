# CI for the native (Rust) engine + desktop shell in native/.
# Kept separate from release.yml: the JS app's pipeline is untouched by the
# rewrite until the shell swap ships.
name: native

on:
  push:
    paths:
      - "native/**"
      - "test/fixtures/**"
      - ".github/workflows/native.yml"
  pull_request:
    paths:
      - "native/**"
      - "test/fixtures/**"
      - ".github/workflows/native.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: System deps (webkit2gtk + gtk for the Tauri shell)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
