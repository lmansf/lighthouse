# CI for the native (Rust) engine + desktop shell in native/.
# Fast ubuntu-only debug build + full test suite; the 3-OS release-build smoke
# lives in release-smoke.yml (also required by desktop-release.yml).
name: native

on:
  push:
    paths:
      - "native/**"
      - "test/fixtures/**"
      - ".github/workflows/native.yml"
  pull_request:
    paths:
      - "native/**"
      - "test/fixtures/**"
      - ".github/workflows/native.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: System deps (webkit2gtk + gtk for the Tauri shell)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      # Model-free quality floors (exit non-zero on any golden violation).
      # Both evals also carry an opt-in provider NL section, but with no
      # LIGHTHOUSE_EVAL_PROVIDER set only the deterministic floor runs here.
      - name: Analytics eval floor (model-free)
        run: cargo run -p lighthouse-core --example analytics_eval --locked
      - name: Chart eval floor (model-free)
        run: cargo run -p lighthouse-core --example chart_eval --locked

  # §40 crate-split tripwire: the tauri-free crates must cargo check WITHOUT
  # webkit/gtk system deps — the dev-container reality this split exists for.
  # Deliberately no apt-get here: a tauri (or any system-lib) dependency
  # creeping into lighthouse-shell or its siblings fails THIS fast job
  # instead of surfacing as "works in CI, dead in the container".
  container-check:
    name: container parity (tauri-free crates)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: cargo check the container-checkable crates (no system deps)
        run: >
          cargo check -p lighthouse-core -p lighthouse-shell -p lighthouse-cli
          -p lighthouse-server -p lighthouse-mcp --locked

  # add-mobile-apps §2.3: per-PR Android portability tripwire. Keeps
  # lighthouse-core — and, since the §2.1 cfg(desktop) split, the
  # lighthouse-desktop LIBRARY (the shared shell the mobile targets link) —
  # cross-compilable for the mobile triple, so a non-portable dependency or a
  # cfg mistake fails HERE (a fast cargo check), not later in the mobile build.
  android-tripwire:
    name: android portability (core + shell lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Resolve NDK toolchain
        run: |
          set -euo pipefail
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          echo "NDK at: $NDK"
          BIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "CC_aarch64_linux_android=$BIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$BIN/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$BIN/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
      - name: cargo check core for aarch64-linux-android
        run: cargo check --target aarch64-linux-android -p lighthouse-core --locked
      # §2.1 VERIFY: the shell library must compile for Android with the
      # desktop modules absent (tray/widget/whisper/supervision cfg'd out).
      - name: cargo check desktop shell LIB for aarch64-linux-android
        run: cargo check --target aarch64-linux-android -p lighthouse-desktop --lib --locked
