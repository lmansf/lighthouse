# Maintenance + live verification for the pinned bundled-asset digests in
# scripts/fetch-local-model.mjs.
#
#   mode=record  → run the fetch in --record mode: compute + print the digests
#                  (and the embedding repo revision) to paste into the script
#                  when bumping a pinned version. Changes nothing by itself.
#   mode=verify  → the normal fail-closed fetch (exactly what desktop-release
#                  runs), then a live smoke test of the B2 embedding stack:
#                  boot the fetched llama-server with --embedding against the
#                  fetched GGUF and assert /v1/embeddings returns sane vectors
#                  (related text pairs must out-score unrelated ones). Then the
#                  retrieval eval: the golden-question benchmark (lexical vs
#                  hybrid, examples/retrieval_eval.rs) runs against the REAL
#                  model and enforces its quality floors.
name: asset-digests

on:
  workflow_dispatch:
    inputs:
      mode:
        description: record (compute digests to pin) or verify (fail-closed fetch + embedding smoke test)
        type: choice
        options:
          - verify
          - record
        default: verify

jobs:
  digests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch bundled assets (${{ inputs.mode }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.mode }}" = "record" ]; then
            node scripts/fetch-local-model.mjs --record
          else
            node scripts/fetch-local-model.mjs
          fi
      - name: Embedding smoke test (llama-server --embedding on the bundled GGUF)
        run: |
          set -euo pipefail
          ls -la resources/embed resources/llm
          resources/llm/llama-server -m resources/embed/*.gguf \
            --host 127.0.0.1 --port 8091 --embedding --pooling mean -c 2048 -ngl 0 &
          SERVER=$!
          trap 'kill $SERVER 2>/dev/null || true' EXIT
          ok=""
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8091/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "embedding server never became healthy"; exit 1; }
          curl -fsS -X POST http://127.0.0.1:8091/v1/embeddings \
            -H 'content-type: application/json' \
            -d '{"model":"x","input":["search_query: Q3 revenue","search_document: quarterly sales revenue by region","search_document: grandma chocolate cake recipe"]}' \
            > embeddings.json
          node -e '
            const r = JSON.parse(require("fs").readFileSync("embeddings.json", "utf8"));
            const v = (i) => r.data?.[i]?.embedding;
            const [q, sales, cake] = [v(0), v(1), v(2)];
            if (!Array.isArray(q) || q.length < 128) throw new Error("bad embedding shape");
            if (q.length !== sales.length || q.length !== cake.length) throw new Error("dim mismatch");
            const cos = (a, b) => {
              let d = 0, na = 0, nb = 0;
              for (let i = 0; i < a.length; i++) { d += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
              return d / Math.sqrt(na * nb);
            };
            const rel = cos(q, sales), unrel = cos(q, cake);
            console.log(`dim ${q.length}; cos(query, sales-doc) = ${rel.toFixed(4)}; cos(query, cake-doc) = ${unrel.toFixed(4)}`);
            if (!(rel > 0.4)) throw new Error(`related pair scored too low: ${rel}`);
            if (!(rel > unrel + 0.05)) throw new Error(`no semantic separation: related ${rel} vs unrelated ${unrel}`);
            console.log("embedding stack OK");
          '
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - name: Retrieval eval (golden set, lexical vs hybrid on the real model)
        run: |
          set -euo pipefail
          resources/llm/llama-server -m resources/embed/*.gguf \
            --host 127.0.0.1 --port 8091 --embedding --pooling mean -c 2048 -ngl 0 &
          SERVER=$!
          trap 'kill $SERVER 2>/dev/null || true' EXIT
          ok=""
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8091/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          [ -n "$ok" ] || { echo "embedding server never became healthy"; exit 1; }
          cd native
          LIGHTHOUSE_EMBED_URL=http://127.0.0.1:8091 cargo run -p lighthouse-core --example retrieval_eval
      - name: OCR smoke (real inference over the committed fixture)
        run: |
          set -euo pipefail
          ls -la resources/ocr
          cd native
          # The #[ignore] ocr_smoke / ocr_pdf_smoke tests drive the full
          # extract path (image + scanned-PDF) against the just-fetched models.
          LIGHTHOUSE_OCR_MODELS_DIR="$GITHUB_WORKSPACE/resources/ocr" \
            cargo test -p lighthouse-core --lib -- --ignored ocr_smoke ocr_pdf_smoke
