# Pre-tag release smoke: on all three OS runners, build the REAL desktop
# binary (static-export UI + release cargo build), run the release-mode engine
# tests that drive one grounded ask over the wire protocol plus the exhaustive
# settings round-trip, then boot the built binary headlessly (Xvfb on Linux)
# and make it answer one real ask through its own webview transport with zero
# network (LIGHTHOUSE_SMOKE=1 — the app self-reports and exits with the
# verdict). desktop-release.yml requires this workflow for the same ref, so
# the v0.2.5-403 / 0.10.0-ocr_enabled class of regression dies before a tag
# is cut instead of in a shipped build. Also runs per-PR on native/shell
# changes — that's where the compile-tripwire (a missed settings call site)
# fires earliest.
name: release-smoke

on:
  workflow_call: {}
  workflow_dispatch: {}
  pull_request:
    paths:
      - "native/**"
      - "src/shell/**"
      - "scripts/build-ui-static.mjs"
      - ".github/workflows/release-smoke.yml"

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    # Cold-cache reality on windows runners: the release binary alone is
    # ~30 min (thin-LTO + codegen-units=1 over DataFusion); warm runs are
    # far faster. 75 gives cold runs headroom without masking a hang.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
          # Shared with desktop-release.yml's bundle job so a smoke build
          # warms the release cache the bundler reuses (and vice versa).
          shared-key: native-release
      - name: Linux system deps (webkit + Xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf xvfb
      - name: Install JS deps
        run: npm ci
      - name: Static-export the UI (arms IPC mode — no local port in the app)
        run: node scripts/build-ui-static.mjs
      - name: Build the real desktop binary + the headless CLI (release)
        working-directory: native
        run: cargo build --release -p lighthouse-desktop -p lighthouse-cli --locked
      - name: Engine smoke — wire-protocol grounded ask + exhaustive settings round-trip
        # Debug profile on purpose: these validate engine BEHAVIOR (incl.
        # per-OS path handling) — the release-codegen guarantees come from
        # the release binary build above + the boot smoke below. Release-
        # profile test compiles (thin-LTO per test binary) blew the windows
        # leg past 60 minutes for no added coverage.
        working-directory: native
        run: |
          cargo test -p lighthouse-server --locked
          cargo test -p lighthouse-core --locked --test settings_test
      - name: Boot smoke — the shipped binary answers one grounded ask, zero network
        shell: bash
        run: |
          STATE="$RUNNER_TEMP/lh-smoke-state"
          VAULT="$RUNNER_TEMP/lh-smoke-vault"
          mkdir -p "$STATE" "$VAULT/docs"
          # Seed the fixture vault + isolated install state (settings pin the
          # vault, window mode, semantic-search off => pure-lexical retrieval,
          # no embed server; experiments pin default-excluded inclusion).
          node -e '
            const fs = require("fs"), path = require("path");
            const [state, vault] = process.argv.slice(1);
            fs.writeFileSync(path.join(vault, "docs", "smoke-fixture.md"), [
              "# Smoke fixture",
              "",
              "The Q3 revenue target for the smoke test is 42 million dollars.",
              "This document exists so CI can prove a grounded, zero-network answer.",
              "",
            ].join("\n"));
            fs.writeFileSync(path.join(state, "lighthouse-settings.json"), JSON.stringify({
              vaultDir: vault, uiMode: "window", startupAsked: true,
              runOnStartup: false, semanticSearch: false,
            }));
          ' "$STATE" "$VAULT"
          BIN="native/target/release/lighthouse-desktop"
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="$BIN.exe"; fi
          export LIGHTHOUSE_SMOKE=1
          export LIGHTHOUSE_SMOKE_STATE="$STATE"
          unset LIGHTHOUSE_API_TOKEN ANTHROPIC_API_KEY OPENAI_API_KEY GOOGLE_API_KEY 2>/dev/null || true
          set +e
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a "$BIN"
          else
            "$BIN"
          fi
          code=$?
          echo "boot smoke exit code: $code (0 = grounded answer with references)"
          exit $code
      - name: Headless smoke — the `lighthouse` CLI answers one grounded ask, zero network
        # The FIRST smoke with NO webview (openspec: add-automation §5.2): drive one
        # grounded, on-device ask through the CLI, which goes through
        # `ask::run_headless_ask` — the same audited chokepoint the app uses — so a
        # SCRIPTED ask is proven to answer with zero network and cite the vault.
        # `--vault` redirects BOTH the vault dir and the state root, so it reads this
        # fixture and writes its audit under it (openspec: add-automation §1.4).
        shell: bash
        run: |
          VAULT="$RUNNER_TEMP/lh-cli-vault"
          mkdir -p "$VAULT/docs"
          node -e '
            const fs = require("fs"), path = require("path");
            const vault = process.argv[1];
            fs.writeFileSync(path.join(vault, "docs", "smoke-fixture.md"), [
              "# Smoke fixture",
              "",
              "The Q3 revenue target for the smoke test is 42 million dollars.",
              "This document exists so CI can prove a grounded, zero-network answer.",
              "",
            ].join("\n"));
            // The CLI answers over the vault files that are RAG-INCLUDED — the
            // headless equivalent of the app`s includedFileIds. A fresh vault
            // defaults to the privacy-preserving "exclude" (profile.rs:
            // DEFAULT_INCLUSION_FALLBACK), so a bare vault has an empty index and
            // the ask honestly returns "Nothing relevant is included". The desktop
            // boot smoke includes the fixture through the /api/rag include op; the
            // CLI has no include subcommand, so we seed the vault`s profile with the
            // same "index everything" onboarding choice a real user would make.
            // `--vault` points profile.json at <vault>/.rag-vault (config.rs:
            // profile_path falls back to state_dir), and the walk skips that
            // dot-dir (vault.rs), so only the fixture becomes a node.
            const stateDir = path.join(vault, ".rag-vault");
            fs.mkdirSync(stateDir, { recursive: true });
            fs.writeFileSync(path.join(stateDir, "profile.json"),
              JSON.stringify({ defaultInclusionChoice: "include" }));
          ' "$VAULT"
          BIN="native/target/release/lighthouse"
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="$BIN.exe"; fi
          # No key in the env, and --local forces the device path: zero egress.
          unset LIGHTHOUSE_API_TOKEN ANTHROPIC_API_KEY OPENAI_API_KEY GOOGLE_API_KEY 2>/dev/null || true
          set +e
          OUT=$("$BIN" ask "What is the Q3 revenue target for the smoke test?" --vault "$VAULT" --local --json)
          code=$?
          set -e
          echo "headless ask exit: $code"
          echo "$OUT"
          if [ "$code" -ne 0 ]; then echo "FAIL: the headless ask did not settle"; exit 1; fi
          # Grounded (quotes the fixture figure), on-device (origin=device), and cites the file.
          printf '%s' "$OUT" | node -e '
            const o = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const grounded = /42[\s ]?million|\b42\b/.test(o.answer || "");
            const device = o.provenance && o.provenance.origin === "device";
            const cited = Array.isArray(o.references) &&
              o.references.some(r => String((r && (r.fileId || r.file_id)) || "").includes("smoke-fixture"));
            if (!(grounded && device && cited)) {
              console.error("FAIL: not grounded/on-device/cited —",
                JSON.stringify({ grounded, device, cited, provenance: o.provenance }));
              process.exit(1);
            }
            console.log("headless smoke OK: grounded, on-device, cites the fixture");
          '
