# Mirror the pinned Piper TTS voice into our own release assets.
#
# Why: the voice is the ONE bundled asset fetched from HuggingFace, and on
# 2026-07-13 HF's xet CDN 403-stormed for hours, blocking every release build
# (llama-server and piper come from GitHub releases and were unaffected).
# The exact bytes we need are already inside our own shipped installers —
# digest-verified at the time they were built — so this workflow extracts the
# voice from a released .deb, re-verifies the pinned SHA-256s, and uploads the
# files to a dedicated non-latest prerelease tag that fetch-local-model.mjs
# tries FIRST (HF stays as fallback). GitHub→runner downloads are the reliable
# path, and the digest pins make the mirror tamper-evident.
#
# The tag deliberately does not match v* so it can never trigger release.yml.
name: mirror-tts

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Released tag whose .deb carries the digest-verified voice"
        default: "v0.8.1"
      mirror_tag:
        description: "Release tag to upload the mirrored voice assets to"
        default: "tts-assets-1"

permissions:
  contents: write # create the mirror release and upload assets

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      # Must match ASSET_SHA256 in scripts/fetch-local-model.mjs.
      ONNX_SHA256: 5efe09e69902187827af646e1a6e9d269dee769f9877d17b16b1b46eeaaf019f
      JSON_SHA256: efe19c417bed055f2d69908248c6ba650fa135bc868b0e6abb3da181dab690a0
    steps:
      - name: Download the released .deb
        run: |
          set -euo pipefail
          gh release download "${{ inputs.source_tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern '*_amd64.deb' --dir deb
          ls -la deb/
      - name: Extract the voice and verify the pinned digests
        run: |
          set -euo pipefail
          dpkg-deb -x deb/*.deb unpacked
          ONNX=$(find unpacked -name 'en_US-lessac-medium.onnx' | head -1)
          JSON=$(find unpacked -name 'en_US-lessac-medium.onnx.json' | head -1)
          [ -n "$ONNX" ] && [ -n "$JSON" ] || { echo "voice files not found in .deb"; find unpacked -maxdepth 4 -type d; exit 1; }
          echo "$ONNX_SHA256  $ONNX" | sha256sum -c -
          echo "$JSON_SHA256  $JSON" | sha256sum -c -
          mkdir -p out
          cp "$ONNX" out/en_US-lessac-medium.onnx
          cp "$JSON" out/en_US-lessac-medium.onnx.json
      - name: Create the mirror release (idempotent) and upload
        run: |
          set -euo pipefail
          TAG="${{ inputs.mirror_tag }}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --prerelease --latest=false \
              --title "TTS voice mirror (build asset)" \
              --notes "Mirror of the pinned Piper voice (en_US-lessac-medium, rhasspy/piper-voices) used by CI builds. Extracted from our own digest-verified installer; scripts/fetch-local-model.mjs verifies the same pinned SHA-256 on every download. Not an app release."
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            out/en_US-lessac-medium.onnx out/en_US-lessac-medium.onnx.json
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[] | "\(.name) \(.size)"'
