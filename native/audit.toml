# Documented triage for the cargo-audit supply-chain gate
# (.github/workflows/supply-chain.yml). The installed cargo-audit takes ignores
# on the command line (`--ignore <ID>`), so the workflow passes the IDs below;
# this file is the human-readable rationale of record. Keep the two in sync.
#
# The gate DENIES any advisory not in this list, so a NEW vulnerability still
# turns CI red and forces triage. Every ignore is a deliberate, documented
# decision with a remediation path — never a blanket disable. The weekly
# scheduled run re-checks; drop an ignore the moment an upstream fix reaches our
# pinned tree.
#
# ── Ignored VULNERABILITIES (these would otherwise fail the gate) ────────────
# All four are denial-of-service on MALFORMED INPUT or a Debug-format edge case
# — not RCE, not data exposure. Lighthouse is local-first and single-user: the
# documents parsed are the user's own local files, extraction runs off the UI
# thread, and per-file failures are caught, so the realistic blast radius is "a
# hand-crafted file you added fails to extract." Accepted until fixes reach our
# tree; each has a remediation path, deferred to a dedicated, 3-OS-CI-tested
# dependency-bump PR (lockfile changes here can't be verified against the
# Windows/macOS release build from the dev container).
#
#   RUSTSEC-2026-0204  crossbeam-epoch  Invalid pointer deref in the fmt::Pointer
#                                    impl for Atomic/Shared (only when Debug-
#                                    formatting an already-invalid pointer).
#                                    Fix: crossbeam-epoch ≥0.9.20 (transitive via
#                                    DataFusion; a clean `cargo update` exists).
#   RUSTSEC-2026-0187  lopdf ≤0.34   Stack overflow via deeply nested PDF
#                                    objects. Fix: lopdf ≥0.42 (major bump of a
#                                    transitive pin — needs a tested dep PR).
#   RUSTSEC-2026-0194  quick-xml     Quadratic time on duplicate start-tag attrs.
#   RUSTSEC-2026-0195  quick-xml     Unbounded namespace allocation in NsReader.
#                                    Both reached via calamine (xlsx) + the OOXML
#                                    /ODF extractors. Fix: quick-xml ≥0.41 — our
#                                    0.41 instance is ALREADY clean; the 0.31 and
#                                    0.36 instances need their parents bumped.
#
# ── NOT ignored, does not fail the gate: unmaintained / unsound / yanked ─────
# cargo-audit reports these as warnings (non-failing). They are irreducible
# transitive deps of the Tauri v2 Linux shell (the gtk-rs GTK3 bindings, which
# upstream deprecated wholesale) and of DataFusion/ring/idna (paste, instant,
# proc-macro-error, spin, unic-*). No drop-in replacement we control; no known
# exploit path in our usage. Left visible in CI output on purpose.
#
# §4 re-triage 2026-07-18 (0.12.5): npm audit --omit=dev clean (0 vulns);
# cargo audit exits 0 with the four ignores above (no new High/Critical). The
# non-failing warning surface is unchanged — 20 allowed warnings:
#   * gtk-rs GTK3 stack (Linux desktop shell only, deprecated upstream):
#     atk/atk-sys, gdk/gdk-sys/gdkwayland-sys/gdkx11/gdkx11-sys,
#     gtk/gtk-sys/gtk3-macros @0.18.2 (RUSTSEC-2024-041x, unmaintained),
#     glib 0.18.5 (RUSTSEC-2024-0429, unsound VariantStrIter — a code path
#     Lighthouse never calls);
#   * transitive elsewhere: instant 0.1.13 (RUSTSEC-2024-0384), paste 1.0.15
#     (RUSTSEC-2024-0436), proc-macro-error 1.0.4 (RUSTSEC-2024-0370),
#     unic-* 0.9.0 (RUSTSEC-2025-0075/-0080/-0081/-0098/-0100), spin 0.9.8
#     (yanked).
# None is a shipped-code vulnerability and none has a semver-compatible fix in
# the pinned tree; each rides on an upstream (Tauri GTK4 migration, DataFusion,
# ring) we don't pin directly. No new ignore added — deliberately left as
# visible warnings, re-checked by the weekly scheduled run.

[advisories]
# Mirrors the workflow's --ignore flags. (Retained for tooling that DOES read
# audit.toml; the pinned cargo-audit passes these on the command line instead.)
ignore = [
  "RUSTSEC-2026-0204",
  "RUSTSEC-2026-0187",
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]
