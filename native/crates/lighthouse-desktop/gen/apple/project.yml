name: lighthouse-desktop
options:
  bundleIdPrefix: app.lhvault
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Lighthouse
      PRODUCT_BUNDLE_IDENTIFIER: app.lhvault
      DEVELOPMENT_TEAM: MRT4QD3Z77
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  lighthouse-desktop_iOS:
    type: application
    platform: iOS
    sources:
      # `- path: Sources` is a recursive folder include, so the Tier-1 Swift
      # shim (Sources/lighthouse-desktop/PrivateModelServer.swift) is picked up
      # here automatically — an xcodegen regen keeps it in the app target's
      # Sources build phase, matching the committed pbxproj (fp3: `tauri ios
      # build` links the COMMITTED pbxproj, so both must reference it).
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: lighthouse-desktop_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: lighthouse-desktop_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # fp2 §5: standing export-compliance declaration — the app uses ONLY
        # exempt standard encryption (rustls/ring TLS, AES-GCM secrets
        # sealing, SHA-2, Ed25519 signature verify; the Cargo.lock crypto
        # inventory grounds this). With the key present App Store Connect
        # stops holding every build on the per-upload compliance question.
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.14.1
        CFBundleVersion: "0.14.1"
    entitlements:
      path: lighthouse-desktop_iOS/lighthouse-desktop_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        # Tier-1 (Apple Foundation Models) is soft-gated at runtime by
        # `SystemLanguageModel.default.availability` and used only behind
        # `#available(iOS 26, *)`, so the app FLOOR stays at 14.0
        # (docs/ios-private-model.md §1). FoundationModels only exists on iOS
        # 26, so it MUST be weak-linked or the app fails to launch on 14–25:
        # disable Swift autolink for it (else autolink forces a hard load
        # command) and link it weakly instead. Network.framework needs no such
        # treatment (available since iOS 12).
        # -exported_symbol pins the Swift shim's @_cdecl entry point into the
        # executable's dyld export trie: Rust resolves it at RUNTIME via
        # dlsym(RTLD_DEFAULT) (commands.rs — zero link-time coupling), and a
        # symbol with no link-time references is exactly what a release
        # archive's dead-strip + symbol strip can silently remove. Exported ⇒
        # dead-strip root ⇒ in the trie ⇒ survives strip ⇒ dlsym always finds
        # it (iOS field report: private model absent on device).
        OTHER_LDFLAGS: ["$(inherited)", "-weak_framework", "FoundationModels", "-Wl,-exported_symbol,_lighthouse_fm_ensure"]
        OTHER_SWIFT_FLAGS: ["$(inherited)", "-Xfrontend", "-disable-autolink-framework", "-Xfrontend", "FoundationModels"]
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: npm run -- tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a