<!doctype html>
<!--
  Loading splash shown the instant the window opens, while the local engine
  (next start + bundled model) boots in the background. Self-contained and
  CSP-safe: inline styles only, no scripts, no external resources. The main
  process swaps this for http://localhost:<port> once the server answers.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lighthouse</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #fbf5e9; /* sandy cream — matches the app theme */
        color: #6b6253;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        overflow: hidden;
        user-select: none;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
      }
      /* The lighthouse beacon: a warm red dot with a soft, slow pulse. */
      .beacon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #e5484d;
        box-shadow: 0 0 0 0 rgba(229, 72, 77, 0.55);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 14px 3px rgba(229, 72, 77, 0.35);
          opacity: 0.85;
        }
        50% {
          box-shadow: 0 0 26px 9px rgba(229, 72, 77, 0.55);
          opacity: 1;
        }
      }
      .title {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.2px;
        color: #463f34;
      }
      .sub {
        font-size: 14px;
        color: #8a8073;
      }
      /* A thin indeterminate progress shimmer under the title. */
      .bar {
        width: 220px;
        height: 4px;
        border-radius: 4px;
        background: rgba(107, 98, 83, 0.15);
        overflow: hidden;
      }
      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 4px;
        background: #e5484d;
        animation: slide 1.3s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="beacon"></div>
      <div class="title">Lighthouse</div>
      <div class="bar"></div>
      <div class="sub">Starting your private vault…</div>
    </div>
  </body>
</html>
