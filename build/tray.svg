<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Lighthouse — Beam mark, monochrome template variant.
       Same silhouette + beam wedge as build/icon.svg, solid black on
       transparent: macOS template images may carry only black + alpha
       (AppKit re-tints them for light/dark menubars). Rendered to
       native/crates/lighthouse-desktop/icons/tray-template.png by
       scripts/gen-icons.mjs. -->
  <g fill="#000000">
    <!-- beam wedge from the lantern -->
    <polygon points="152,118 496,16 496,132"/>
    <!-- the light -->
    <circle cx="152" cy="118" r="26"/>
    <!-- tower: footing, tapered body, gallery -->
    <rect x="64" y="468" width="176" height="24" rx="12"/>
    <polygon points="88,468 216,468 184,196 120,196"/>
    <rect x="98" y="166" width="108" height="30" rx="15"/>
  </g>
</svg>
