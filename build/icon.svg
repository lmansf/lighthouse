<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Lighthouse — the Beam mark.
       Ink field, paper tower, one amber beam. Flat geometry only. The
       load-bearing shapes (tower, light, beam origin) sit inside the central
       ~80% (x,y within 102–922) so the mark survives an OS squircle crop;
       the beam deliberately runs off through the top-right corner, clipped
       by the tile itself. -->
  <defs>
    <linearGradient id="beam" gradientUnits="userSpaceOnUse" x1="396" y1="298" x2="873" y2="81">
      <stop offset="0" stop-color="#E8A317"/>
      <stop offset="1" stop-color="#FFC24D"/>
    </linearGradient>
    <clipPath id="tile"><rect x="0" y="0" width="1024" height="1024" rx="224"/></clipPath>
  </defs>

  <!-- ink field -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="#0E0F12"/>

  <!-- the beam: a single wedge sweeping up-right from the lantern, out of frame -->
  <polygon points="396,298 1100,-195 1100,122" fill="url(#beam)" clip-path="url(#tile)"/>

  <!-- the light -->
  <circle cx="396" cy="298" r="28" fill="#FFC24D"/>

  <!-- paper tower: footing, tapered body, gallery -->
  <g fill="#F4EFE6">
    <rect x="288" y="812" width="216" height="26" rx="13"/>
    <polygon points="318,812 474,812 436,380 356,380"/>
    <rect x="330" y="344" width="132" height="36" rx="18"/>
  </g>
</svg>
